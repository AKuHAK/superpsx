name: CI

on:
  push:
    branches:
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Default"
            vram_dump: "OFF"
            host_log: "OFF"
            debug_log: "OFF"
            stuck_detection: "ON"
          - name: "Debug"
            vram_dump: "OFF"
            host_log: "OFF"
            debug_log: "ON"
            stuck_detection: "ON"
          - name: "Full logging"
            vram_dump: "ON"
            host_log: "ON"
            debug_log: "ON"
            stuck_detection: "ON"
          - name: "VRAM dump"
            vram_dump: "ON"
            host_log: "OFF"
            debug_log: "OFF"
            stuck_detection: "ON"
          - name: "Profiling"
            vram_dump: "OFF"
            host_log: "OFF"
            debug_log: "OFF"
            stuck_detection: "OFF"
            profiling: "ON"
          - name: "Headless"
            vram_dump: "OFF"
            host_log: "OFF"
            debug_log: "OFF"
            stuck_detection: "OFF"
            headless: "ON"
          - name: "Release"
            vram_dump: "OFF"
            host_log: "OFF"
            debug_log: "OFF"
            stuck_detection: "OFF"
            lto: "ON"

    name: "PS2 - ${{ matrix.name }}"

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk update
        apk add cmake git gmp mpc1 mpfr4 make

    - name: Use upstream ps2sdk
      run: |
        set -euo pipefail

        PS2DEV_PATH="${PS2DEV:-/usr/local/ps2dev}"
        PS2SDK_PATH="${PS2SDK:-$PS2DEV_PATH/ps2sdk}"

        rm -rf "$PS2SDK_PATH"
        git clone --depth 1 https://github.com/ps2dev/ps2sdk.git "$PS2SDK_PATH"

        make -C "$PS2SDK_PATH" -j "$(getconf _NPROCESSORS_ONLN)"
        make -C "$PS2SDK_PATH" install

    - name: Configure with CMake
      run: |
        cmake -B build \
          -DENABLE_VRAM_DUMP=${{ matrix.vram_dump }} \
          -DENABLE_HOST_LOG=${{ matrix.host_log }} \
          -DENABLE_DEBUG_LOG=${{ matrix.debug_log }} \
          -DENABLE_STUCK_DETECTION=${{ matrix.stuck_detection }} \
          -DENABLE_PROFILING=${{ matrix.profiling || 'OFF' }} \
          -DENABLE_LTO=${{ matrix.lto || 'OFF' }} \
          -DHEADLESS=${{ matrix.headless || 'OFF' }}

    - name: Build project with CMake
      run: |
        cmake --build build -j $(getconf _NPROCESSORS_ONLN)

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: superpsx-ps2-${{ matrix.name }}-${{ steps.slug.outputs.sha8 }}
        path: |
          build/superpsx.elf

  build-psp:
    runs-on: ubuntu-latest
    container: pspdev/pspdev:latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Default"
            host_log: "OFF"
            debug_log: "OFF"
          - name: "Debug"
            host_log: "OFF"
            debug_log: "ON"
          - name: "Release"
            host_log: "OFF"
            debug_log: "OFF"
            lto: "ON"

    name: "PSP - ${{ matrix.name }}"

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk update
        apk add cmake make

    - name: Configure with CMake
      run: |
        cmake -B build-psp \
          -DCMAKE_TOOLCHAIN_FILE=$PSPDEV/psp/share/pspdev.cmake \
          -DENABLE_HOST_LOG=${{ matrix.host_log }} \
          -DENABLE_DEBUG_LOG=${{ matrix.debug_log }} \
          -DENABLE_LTO=${{ matrix.lto || 'OFF' }}

    - name: Build project with CMake
      run: |
        cmake --build build-psp -j $(getconf _NPROCESSORS_ONLN)

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: superpsx-psp-${{ matrix.name }}-${{ steps.slug.outputs.sha8 }}
        path: |
          build-psp/EBOOT.PBP
